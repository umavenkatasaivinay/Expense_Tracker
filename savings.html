<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>savings goal page</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous"/>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</head>
<style>
.imf{
    height:60%;
    width:60%;
}
.bg-container-three{
    background-image:linear-gradient(#34e8eb,#eb34cc);
        height:100%;
}
</style>
<body>
    <div class="container p-3 bg-container-three">
        <input type="number" class="form-control" id="inp2" placeholder="enter your savings goal"/>
        <h1 >Savings Goal: <span id="salary2"></span></h1>
        <p>press ENTER after entering goal</p>
        <img id="image"/>
        <div class="">
        <label for="inp3">Add Today's amount to reach savings goal</label>
        <input type="number" class="form-control" id="inp3" placeholder="enter your todays savings"/>
        <div class="d-flex justify-content-center">
        <button class="p-3 m-2 btn btn-primary text-light " id="btn3">Add</button>
    </div>
    </div>
    <h1 id="para2"></h1>
    </div>
</body>
<script>
let inpo=document.getElementById("inp2")
let s=document.getElementById("salary2");
inpo.addEventListener("keydown",function(event){
    if(event.key==="Enter"){
        s.textContent=inpo.value;
        let im=document.getElementById("image");
        if(parseFloat(inpo.value)===50000){
            im.src="https://i.etsystatic.com/33729715/r/il/c485a8/3792191478/il_fullxfull.3792191478_3ica.jpg";
            im.classList.add("imf");
        }else if(parseFloat(inpo.value)===10000){
            im.src="https://i.pinimg.com/originals/c6/31/d0/c631d055d3c6af63f006babdb8cef034.jpg";
            
        }
    }
})
let count=0;
let bt3=document.getElementById("btn3");
let sum=0;
let p=document.getElementById("para2");
bt3.addEventListener("click",function(){
    let inpi=document.getElementById("inp3");
    localStorage.setItem("save",inpo.value);
    localStorage.setItem(JSON.stringify(count),inpi.value);
    let m=localStorage.getItem(JSON.stringify(count));
    sum=sum+Number(m);
    let s=localStorage.getItem("save");
    if(sum>=s){
        p.textContent="you reached your goal!"
        alert("hurray! you completd your goal");
    }
    inpi.value="";
})
</script>
</html>
